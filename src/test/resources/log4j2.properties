status = warn
name = PropertiesConfig

# Define system properties
property.filename = logs/app.log

# Configure the Console Appender
appender.console.type = Console
appender.console.name = STDOUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p [%t] %c{1} - %m%n

# Configure a Rolling File Appender
# ${sys:user.dir}/logs/${sys:testName}-${date:yyyy-MM-dd-HH-mm-ss}.log   (timestamp)
appender.file.type = RollingFile
appender.file.name = RollingFile
appender.file.fileName=${sys:user.dir}/logs/${sys:testName:-default}.log
appender.file.filePattern=${sys:user.dir}/logs/archive/${sys:testName:-default}-%d{MM-dd-yyyy}-%i.log.gz
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p [%t] %c{1} - %m%n
appender.file.policies.type = Policies
appender.file.policies.size.type = SizeBasedTriggeringPolicy
appender.file.policies.size.size = 10MB
appender.file.strategy.type = DefaultRolloverStrategy
appender.file.strategy.max = 5

# Configure the Root Logger
rootLogger.level = debug
rootLogger.appenderRef.stdout.ref = STDOUT
rootLogger.appenderRef.file.ref = RollingFile

# Configure a specific logger for a package
logger.app.name = base
logger.app.level = info
logger.app.additivity = false
logger.app.appenderRef.stdout.ref = STDOUT
logger.app.appenderRef.file.ref = RollingFile